    <main>
        <h1 style="text-align: center;">Get in Touch</h1>
        
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
        </form>

        <div style="text-align: center; margin-top: 3rem;">
            <h3>Connect with me on Social Media</h3>
            <p style="font-size: 1.5rem; margin-top: 10px;">
                <a href="https://www.linkedin.com/in/yuanyang-chen-b8113723b" target="_blank" style="color:#0077b5; margin: 0 15px;"><i class="fab fa-linkedin"></i> LinkedIn</a>
                <a href="https://github.com/yuanyangCyy" target="_blank" style="color:#333; margin: 0 15px;"><i class="fab fa-github"></i> GitHub</a>
            </p>
        </div>
    </main>
